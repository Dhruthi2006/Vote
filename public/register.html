<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Vote Smart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🗳️</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register to participate in elections</p>
      </div>

      <div id="alertContainer"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            class="form-input" 
            placeholder="Enter your full name"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="studentId">Student ID</label>
          <input 
            type="text" 
            id="studentId" 
            class="form-input" 
            placeholder="Enter your student ID"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="Enter your college email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Create a password"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            class="form-input" 
            placeholder="Confirm your password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Login here</a>
      </div>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value;
      const studentId = document.getElementById('studentId').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'error');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating account...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, studentId, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Registration successful! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } else {
          showAlert(data.error || 'Registration failed', 'error');
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
      }
    });

    function showAlert(message, type) {
      const alertContainer = document.getElementById('alertContainer');
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">
          ${type === 'success' ? '✓' : '✕'} ${message}
        </div>
      `;
    }
  </script>
 
</body>
</html>
