<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DARK THEME -->
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
    }

    .card {
      background-color: #1e293b;
      color: #e2e8f0;
      border: none;
    }

    .navbar {
      background-color: #020617 !important;
    }

    .form-control, .form-select {
      background-color: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
    }

    .form-control::placeholder {
      color: #94a3b8;
    }

    .btn-primary {
      background-color: #2563eb;
      border: none;
    }

    .btn-primary:hover {
      background-color: #1d4ed8;
    }

    .btn-outline-light {
      border-color: #2563eb;
      color: #2563eb;
    }

    .btn-outline-light:hover {
      background-color: #2563eb;
      color: white;
    }

    .table {
      color: #e2e8f0;
    }

    .badge {
      background-color: #2563eb;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">🗳️ Admin Dashboard</span>

  <div class="d-flex align-items-center gap-3">
    <a href="/vote" class="btn btn-primary btn-sm">🗳️ Vote</a>
    <a href="/results" class="btn btn-primary btn-sm">📊 Results</a>

    <span id="adminName" class="text-white"></span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<main class="container py-4">

  <!-- STATS -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <h6>Total Students</h6>
          <h3 id="totalStudents">0</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <h6>Total Votes</h6>
          <h3 id="totalVotesCount">0</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <h6>Active Elections</h6>
          <h3 id="activeElections">0</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <h6>Completed Elections</h6>
          <h3 id="completedElections">0</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">

    <!-- CREATE ELECTION -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Create Election</h5>
          <form id="createElectionForm">
            <input class="form-control mb-2" id="title" placeholder="Title" required />
            <input class="form-control mb-2" id="description" placeholder="Description" required />
            <input class="form-control mb-2" type="datetime-local" id="startDate" required />
            <input class="form-control mb-2" type="datetime-local" id="endDate" required />
            <button class="btn btn-primary w-100">Create</button>
          </form>
        </div>
      </div>
    </div>

 <!-- ASSIGN STUDENTS -->
<div class="col-md-6">
  <div class="card shadow-sm">
    <div class="card-body">
      <h5>Assign Students</h5>

      <select id="eligibleElection" class="form-select mb-3"></select>

      <!-- BUTTONS (MOVE HERE) -->
      <div class="d-flex gap-2 mb-2">
        <button type="button" class="btn btn-primary btn-sm w-50" onclick="selectAllStudents()">
          Select All
        </button>

        <button type="button" class="btn btn-outline-light btn-sm w-50" onclick="deselectAllStudents()">
          Deselect All
        </button>
      </div>

      <!-- STUDENT LIST -->
      <div id="studentsList" class="border rounded p-2" style="max-height:200px; overflow:auto;">
        Loading...
      </div>

      <button class="btn btn-primary w-100 mt-3" onclick="assignVoters()">
        Assign Students
      </button>
    </div>
  </div>
</div>
          
        </div>
      </div>
    </div>

    <!-- ADD CANDIDATE -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Add Candidate</h5>
          <form id="addCandidateForm">
            <select id="candidateElection" class="form-select mb-2" required></select>
            <input class="form-control mb-2" id="candidateName" placeholder="Name" required />
            <input class="form-control mb-2" id="position" placeholder="Position" required />
            <input class="form-control mb-2" id="department" placeholder="Department" required />
            <textarea class="form-control mb-2" id="manifesto" placeholder="Manifesto"></textarea>
            <input class="form-control mb-2" id="photoUrl" placeholder="Photo URL"/>
            <button class="btn btn-primary w-100">Add Candidate</button>
          </form>
        </div>
      </div>
    </div>

    <!-- ELECTION TABLE -->
    <div class="col-md-12">
      <div class="card table dark shadow-sm">
        <div class="card-body">
          <h5>Manage Elections</h5>
          <div id="electionsTable" class="mt-3"></div>
        </div>
      </div>
    </div>

  </div>

</main>

<script src="auth.js"></script>

<script>
requireAuth("admin");

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

document.getElementById("adminName").textContent = user.fullName || "";

// LOAD STATS
async function loadStats() {
  const res = await fetch("/api/admin/stats", {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();

  totalStudents.textContent = data.totalStudents;
  totalVotesCount.textContent = data.totalVotes;
  activeElections.textContent = data.activeElections;
  completedElections.textContent = data.completedElections;
}

// LOAD STUDENTS
async function loadStudents() {
  const electionId = eligibleElection.value;

  // 🚨 STOP if no election selected
  if (!electionId) {
    document.getElementById("studentsList").innerHTML = "⚠️ Select an election first";
    return;
  }

  try {
    const assignedRes = await fetch(`/api/elections/${electionId}/assigned-students`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const assignedStudents = await assignedRes.json();

    const res = await fetch("/api/admin/students", {
      headers: { Authorization: `Bearer ${token}` }
    });

    const students = await res.json();
    const container = document.getElementById("studentsList");
    container.innerHTML = "";

    students.forEach(s => {
      const isChecked = assignedStudents.includes(s._id);

      container.innerHTML += `
        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            value="${s._id}" ${isChecked ? "checked" : ""}>

          <label class="form-check-label">
            ${s.fullName} (${s.studentId})
          </label>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    document.getElementById("studentsList").innerHTML = "❌ Failed to load students";
  }
}
// LOAD ELECTIONS
async function loadElections() {
  const res = await fetch("/api/elections", {
    headers: { Authorization: `Bearer ${token}` }
  });

  const elections = await res.json();

  eligibleElection.innerHTML = "";
  candidateElection.innerHTML = "";

  elections.forEach(e => {
    eligibleElection.innerHTML += `<option value="${e._id}">${e.title}</option>`;
    candidateElection.innerHTML += `<option value="${e._id}">${e.title}</option>`;
  });

  electionsTable.innerHTML = `
    <table class="table table-bordered table-dark table-hover custom-table align-middle">
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        ${elections.map(e => `
          <tr>
            <td>${e.title}</td>
            <td><span class="badge">${e.status}</span></td>
            <td>
              <select class="form-select" onchange="updateStatus('${e._id}', this.value)">
                <option value="">Change</option>
                <option value="upcoming">Upcoming</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
              </select>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}
function selectAllStudents() {
  document.querySelectorAll("#studentsList input[type='checkbox']")
    .forEach(cb => cb.checked = true);
}

function deselectAllStudents() {
  document.querySelectorAll("#studentsList input[type='checkbox']")
    .forEach(cb => cb.checked = false);
}
function toggleAllStudents() {
  const checkboxes = document.querySelectorAll("#studentsList input[type='checkbox']");
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);

  checkboxes.forEach(cb => cb.checked = !allChecked);
}
// ASSIGN VOTERS
async function assignVoters() {
  const electionId = eligibleElection.value;

  const selected = Array.from(
    document.querySelectorAll("#studentsList input:checked")
  ).map(cb => cb.value);

  const res = await fetch(`/api/elections/${electionId}/assign-voters`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ studentIds: selected })
  });

  alert(res.ok ? "Assigned ✅" : "Failed ❌");
}

// UPDATE STATUS
async function updateStatus(id, status) {
  if (!status) return;

  await fetch(`/api/elections/${id}/status`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ status })
  });

  loadElections();
}

// CREATE ELECTION
document.getElementById("createElectionForm").onsubmit = async (e) => {
  e.preventDefault();

  await fetch("/api/elections", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({
      title: title.value,
      description: description.value,
      startDate: startDate.value,
      endDate: endDate.value
    })
  });

  e.target.reset();
  loadElections();
};

// ADD CANDIDATE
document.getElementById("addCandidateForm").onsubmit = async (e) => {
  e.preventDefault();

  await fetch("/api/candidates", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({
      electionId: candidateElection.value,
      fullName: candidateName.value,
      position: position.value,
      department: department.value,
      manifesto: manifesto.value,
      photoUrl: photoUrl.value
    })
  });

  e.target.reset();
};

// INIT
loadStats();
loadStats();
loadElections().then(() => {
  loadStudents();
});
eligibleElection.onchange = () => {
  loadStudents();
};
</script>

</body>
</html>
